      --accent-strong:#dbeafe;

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
                   "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .hero {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 24px 18px;
      margin-bottom: 16px;
    }
    .eyebrow {
      display: inline-block;
      font-size: 12px;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 5px 10px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.2;
      color: #0f172a;
    }
    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }
    .tip {
      margin-top: 14px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: #475467;
      line-height: 1.75;
    }

    .topnav-wrap {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 10px 0 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(247,250,255,.97), rgba(247,250,255,.88));
      transition: box-shadow .18s ease, background .18s ease;
    }
    .topnav-wrap.scrolled {
      box-shadow: 0 10px 24px rgba(15,23,42,.08);
      background: linear-gradient(180deg, rgba(247,250,255,.985), rgba(247,250,255,.93));

    .topnav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }
    .topnav-link {
      display: block;
      width: 100%;
      min-height: 96px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px 13px;
      background: rgba(255,255,255,.97);
      box-shadow: 0 4px 14px rgba(15,23,42,.04);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;

    .topnav-link:hover {

    .topnav-link.active {

      outline: 2px solid rgba(220,38,38,.18);

    .topnav-title {
      display: block;
      font-size: 1.03rem;
      font-weight: 700;
      color: #111827;
    }
    .topnav-desc {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.5;
    }
    .subnav-bar {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding: 2px 2px 0;
      min-height: 34px;
      max-height: 38vh;
      overflow: auto;

    .subnav-bar.show {
      display: flex;
    }

    .subnav-chip {
      appearance: none;
      border: 1px solid #dbe3ef;
      background: rgba(255,255,255,.96);
      color: #475467;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12.5px;
      line-height: 1.2;
      cursor: pointer;
      transition: all .15s ease;
      box-shadow: 0 2px 8px rgba(15,23,42,.03);
      white-space: nowrap;

    .subnav-chip:hover {
      transform: translateY(-1px);
      border-color: #bfd3ff;
      color: #175cd3;
      background: #f8fbff;
      box-shadow: 0 8px 18px rgba(37,99,235,.08);

    .subnav-chip.active {
      border-color: #f3b8b8;
      background: linear-gradient(180deg, #ffffff 0%, #fff5f5 100%);
      color: #b42318;
      box-shadow: 0 8px 18px rgba(220,38,38,.08);

    .subnav-empty {
      font-size: 12.5px;

    .subnav-toggle-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      border: 1px solid #dbe3ef;
      background: rgba(255,255,255,.97);
      color: #344054;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.2;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(15,23,42,.04);

    .subnav-toggle-btn:hover {
      border-color: #bfd3ff;
      color: #175cd3;
      background: #f8fbff;
    }
    .subnav-toggle-btn.is-open {
      border-color: #f3b8b8;
      color: #b42318;
      background: linear-gradient(180deg, #ffffff 0%, #fff5f5 100%);
      box-shadow: 0 8px 18px rgba(220,38,38,.06);

      flex-direction: column;
      gap: 18px;

    .doc-section {

    .doc-section.active-section {

      background: #fff;

      position: fixed;

      bottom: 18px;

      height: 44px;
      border: none;
      border-radius: 999px;

                data-report-label="选股结果提取明细"
                onload="handlePortalFrameLoad(this)">
              </iframe>
            </section>
            
            <section class="doc-section portal-hidden-section" id="report-stocks-selection">
              <iframe
                id="frame-2"
                class="doc-frame"
                loading="lazy"
                referrerpolicy="no-referrer"
                src="20260506_wealth_20260503_020540_assets/03_report-stocks-selection.html" data-src="20260506_wealth_20260503_020540_assets/03_report-stocks-selection.html"
                data-report-anchor="report-stocks-selection"
                data-report-label="概念板块双模式选股"
                onload="handlePortalFrameLoad(this)">
              </iframe>
            </section>
            
    </div>
  </div>

  <button class="floating-top" type="button" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

  <script>
    let __portalScrollTicking = false;
    let __portalResizeTimer = null;
    let __portalManualScrolling = false;
    let __portalActiveHeadingId = "";
    const __portalSubnavCache = {};
    let __portalSubnavCollapsed = true;

    function resizeFrame(iframe) {
      if (!iframe) return;
      try {
        const doc = iframe.contentWindow.document;
        if (!doc) return;
        const body = doc.body;
        const html = doc.documentElement;
        const h = Math.max(
          body ? body.scrollHeight : 0,
          body ? body.offsetHeight : 0,
          html ? html.clientHeight : 0,
          html ? html.scrollHeight : 0,
          html ? html.offsetHeight : 0
        );
        iframe.style.height = (Math.max(h + 8, 1200)) + "px";
      } catch (e) {
        iframe.style.height = "1600px";
      }
    }

    // PATCH-PORTAL-SPLIT-LAZY-IFRAME-V1:
    // iframe 改为外部子页面后，必须判断其是否真正加载完，避免目录提取读到 about:blank。
    function isFrameReady(iframe) {
      try {
        if (!iframe) return false;
        const doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
        if (!doc || !doc.body) return false;
        if (doc.readyState === 'loading') return false;
        return doc.body.children.length > 0 || !!doc.querySelector('h1,h2,h3,table,.content,.article');
      } catch (e) {
        return false;
      }
    }

    function handlePortalFrameLoad(iframe) {
      if (!iframe) return;
      iframe.dataset.loaded = '1';
      resizeFrame(iframe);
      setTimeout(function() { resizeFrame(iframe); }, 80);
      setTimeout(function() { resizeFrame(iframe); }, 350);
      setTimeout(function() { resizeFrame(iframe); }, 1200);

      const section = iframe.closest ? iframe.closest('.doc-section') : null;
      const sectionId = section ? section.id : '';
      if (sectionId) {
        delete __portalSubnavCache[sectionId];
        const current = getCurrentSectionId ? getCurrentSectionId() : '';
        if (current === sectionId) {
          setTimeout(function() {
            renderSubnav(sectionId);
            updateActiveHeadingByScroll(sectionId);
            syncSubnavUI();
          }, 120);
        }
      }
    }

    function afterFrameReady(sectionId, callback) {
      const iframe = getSectionFrame(sectionId);
      if (!iframe) return;
      if (isFrameReady(iframe)) {
        callback(iframe);
        return;
      }
      iframe.addEventListener('load', function() {
        callback(iframe);
      }, { once: true });
    }

    function resizeAllFrames() {
      document.querySelectorAll(".doc-frame").forEach(function(frame) {
        if (isFrameReady(frame)) {
          resizeFrame(frame);
        } else {
          frame.style.minHeight = frame.style.minHeight || "1200px";
        }
      });
    }

    function debounceResizeAllFrames() {
      if (__portalResizeTimer) {
        clearTimeout(__portalResizeTimer);
      }
      __portalResizeTimer = setTimeout(function() {
        resizeAllFrames();
      }, 120);
    }

    function getTopbarOffset() {
      const topbar = document.getElementById('topnav-wrap');
      return (topbar ? topbar.offsetHeight : 0) + 18;
    }

    function scrollToSection(sectionId, updateHash=true) {
      const el = document.getElementById(sectionId);
      if (!el) return;
      const offset = getTopbarOffset();
      const y = el.getBoundingClientRect().top + window.pageYOffset - offset;

      __portalManualScrolling = true;
      window.scrollTo({ top: y, behavior: 'smooth' });
      setActiveNavById(sectionId);

      document.querySelectorAll('.doc-section').forEach(function(sec) {
        sec.classList.toggle('active-section', sec.id === sectionId);
      });

      if (updateHash && history.replaceState) {
        history.replaceState(null, "", "#" + sectionId);
      }

      setTimeout(function() {
        __portalManualScrolling = false;
      }, 500);
    }

    function setActiveNavById(sectionId) {
      document.querySelectorAll('.topnav-link').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.target === sectionId);
      });
      document.querySelectorAll('.doc-section').forEach(function(sec) {
        sec.classList.toggle('active-section', sec.id === sectionId);
      });
      renderSubnav(sectionId);
    }

    function getSectionFrame(sectionId) {
      const section = document.getElementById(sectionId);
      if (!section) return null;
      return section.querySelector('.doc-frame');
    }

    function normalizeHeadingText(text) {
      return (text || "").replace(/\s+/g, " ").trim();
    }
    // PATCH_PORTAL_SUBNAV_PICKS_H2_H3_ONLY_V2
    function getFrameHeadings(sectionId) {
      if (__portalSubnavCache[sectionId]) {
        return __portalSubnavCache[sectionId];
      }
      const iframe = getSectionFrame(sectionId);
      if (!iframe) return [];

      if (!isFrameReady(iframe)) {
        if (!iframe.dataset.subnavWaitBound) {
          iframe.dataset.subnavWaitBound = '1';
          iframe.addEventListener('load', function() {
            iframe.dataset.subnavWaitBound = '';
            delete __portalSubnavCache[sectionId];
            resizeFrame(iframe);
            renderSubnav(sectionId);
            updateActiveHeadingByScroll(sectionId);
            syncSubnavUI();
          }, { once: true });
        }
        return [];
      }

      try {
        const doc = iframe.contentWindow.document;
        if (!doc) return [];

        const pageTitle = normalizeHeadingText(
          (doc.querySelector('title') && doc.querySelector('title').textContent) || ''
        );

        // “选股结果提取”页更克制：只取 h2 / h3
        // “概念板块双模式选股”页只保留 h2（总览 + 各概念名），避免重复出现
        // “1. 板块与题材榜摘要 / 2. 与前一日对比 / 3. 概念对应个股池 ...” 这类重复目录
        const isPicksPage =
          /选股结果提取/.test(pageTitle) ||
          /report-picks/i.test(sectionId);

        const isStocksSelectionPage =
          /概念板块双模式选股/.test(pageTitle) ||
          /report-stocks-selection/i.test(sectionId);

        const selector = isStocksSelectionPage
          ? 'h2[id]'
          : (isPicksPage ? 'h2[id], h3[id]' : 'h2[id], h3[id], h4[id], h5[id]');

        const allNodes = Array.from(doc.querySelectorAll(selector));

        function isUsefulHeading(text) {
          const t = normalizeHeadingText(text);
          if (!t) return false;
          if (t.length < 2) return false;
          if (/^[\d\.\-\s]+$/.test(t)) return false;
          if (/^(表|图)\s*\d+$/i.test(t)) return false;
          if (/^(目录|文档导航|导航)$/i.test(t)) return false;
          return true;
        }

        const nodes = [];
        const seenIds = new Set();
        let currentH2 = "";

        const levelCaps = isStocksSelectionPage
          ? { h2: 160 }
          : (isPicksPage ? { h2: 40, h3: 160 } : { h2: 999, h3: 60, h4: 60, h5: 40 });

        const levelCount = isStocksSelectionPage
          ? { h2: 0 }
          : (isPicksPage ? { h2: 0, h3: 0 } : { h2: 0, h3: 0, h4: 0, h5: 0 });

        const TOTAL_CAP = isStocksSelectionPage ? 160 : (isPicksPage ? 220 : 160);

        allNodes.forEach(function(node) {
          if (nodes.length >= TOTAL_CAP) return;

          const level = (node.tagName || '').toLowerCase();
          if (!Object.prototype.hasOwnProperty.call(levelCaps, level)) return;
          if (levelCount[level] >= levelCaps[level]) return;

          const id = (node.id || '').trim();
          if (!id) return;

          const dedupKey = level + "::" + id;
          if (seenIds.has(dedupKey)) return;
          seenIds.add(dedupKey);

          const text = normalizeHeadingText(node.textContent);
          if (!isUsefulHeading(text)) return;

          if (level === 'h2') {
            currentH2 = text;
          }

          nodes.push({
            id: id,
            text: text,
            rawText: text,
            parentText: currentH2,
            level: level
          });

          levelCount[level] += 1;
        });

        if (isPicksPage) {
          // 不是删除同名标题，而是给跨版本重复 h3 自动补父级前缀
          // 例如：
          // V10结果 · 核心总分Top
          // V9结果 · 核心总分Top
          const dupCount = {};

          nodes.forEach(function(item) {
            if (item.level === 'h3') {
              dupCount[item.rawText] = (dupCount[item.rawText] || 0) + 1;
            }
          });

          nodes.forEach(function(item) {
            if (
              item.level === 'h3' &&
              dupCount[item.rawText] > 1 &&
              item.parentText
            ) {
              item.text = item.parentText + ' · ' + item.rawText;
            }
          });
        }

        if (isStocksSelectionPage) {
          const seenText = new Set();
          const compactNodes = [];
          nodes.forEach(function(item) {
            const key = normalizeHeadingText(item.rawText || item.text);
            if (!key) return;
            if (seenText.has(key)) return;
            seenText.add(key);
            compactNodes.push(item);
          });
          __portalSubnavCache[sectionId] = compactNodes;
          return compactNodes;
        }

        __portalSubnavCache[sectionId] = nodes;
        return nodes;
      } catch (e) {
        return [];
      }
    }

    function renderSubnav(sectionId) {

      const box = document.getElementById('subnav-bar');
      if (!box) return;
      const headings = getFrameHeadings(sectionId);
      if (!headings.length) {
        box.innerHTML = '<div class="subnav-empty">当前区域暂无可提取的小标题导航</div>';
        syncSubnavUI();
        return;
      }
      box.innerHTML = headings.map(function(item) {
        const safeText = item.text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
        const activeCls = (__portalActiveHeadingId === (sectionId + '::' + item.id)) ? ' active' : '';
        return '<button class="subnav-chip' + activeCls + '" type="button" data-section="' + sectionId + '" data-heading-id="' + item.id + '">' + safeText + '</button>';
      }).join('');
      box.querySelectorAll('.subnav-chip').forEach(function(btn) {
        btn.addEventListener('click', function() {
          scrollToFrameHeading(btn.dataset.section, btn.dataset.headingId, true);
        });
      });

      syncSubnavUI();
    }

    function scrollToFrameHeading(sectionId, headingId, updateHash=true) {
      const section = document.getElementById(sectionId);
      const iframe = getSectionFrame(sectionId);
      if (!section || !iframe) {
        scrollToSection(sectionId, updateHash);
        return;
      }
      if (!isFrameReady(iframe)) {
        afterFrameReady(sectionId, function() {
          scrollToFrameHeading(sectionId, headingId, updateHash);
        });
        scrollToSection(sectionId, updateHash);
        return;
      }
      try {
        const doc = iframe.contentWindow.document;
        const target = doc.getElementById(headingId);
        if (!target) {
          scrollToSection(sectionId, updateHash);
          return;
        }
        const offset = getTopbarOffset();
        const sectionTop = section.getBoundingClientRect().top + window.pageYOffset;
        const bodyRectTop = doc.body.getBoundingClientRect().top;
        const targetTopInFrame = target.getBoundingClientRect().top - bodyRectTop;
        const y = sectionTop + targetTopInFrame - offset - 6;

        __portalManualScrolling = true;
        __portalActiveHeadingId = sectionId + '::' + headingId;
        window.scrollTo({ top: y, behavior: 'smooth' });
        setActiveNavById(sectionId);

        document.querySelectorAll('.subnav-chip').forEach(function(chip) {
          const on = chip.dataset.section === sectionId && chip.dataset.headingId === headingId;
          chip.classList.toggle('active', on);
        });

        __portalSubnavCollapsed = true;
        syncSubnavUI();

        if (updateHash && history.replaceState) {
          history.replaceState(null, "", "#" + sectionId + "::" + headingId);
        }
        setTimeout(function() {
          __portalManualScrolling = false;
        }, 500);
      } catch (e) {
        scrollToSection(sectionId, updateHash);
      }
    }

    function updateActiveHeadingByScroll(sectionId) {
      const iframe = getSectionFrame(sectionId);
      const section = document.getElementById(sectionId);
      if (!iframe || !section) return;
      if (!isFrameReady(iframe)) return;
      try {
        const doc = iframe.contentWindow.document;
        const headings = Array.from(doc.querySelectorAll('h2[id], h3[id]'));
        if (!headings.length) return;

        const sectionRect = section.getBoundingClientRect();
        const probeYInSection = Math.max(0, getTopbarOffset() + 18 - sectionRect.top);
        const bodyRectTop = doc.body.getBoundingClientRect().top;

        let best = null;
        let bestY = -Infinity;
        headings.forEach(function(h) {
          const y = h.getBoundingClientRect().top - bodyRectTop;
          if (y <= probeYInSection + 12 && y > bestY) {
            best = h;
            bestY = y;
          }
        });
        if (!best) best = headings[0];

        __portalActiveHeadingId = sectionId + '::' + best.id;
        document.querySelectorAll('.subnav-chip').forEach(function(chip) {
          const on = chip.dataset.section === sectionId && chip.dataset.headingId === best.id;
          chip.classList.toggle('active', on);
        });
      } catch (e) {
      }
    }


    // PATCH-HTML-MOBILE-PORTAL-FIXED-REAL-V4
    function syncMobileFixedTopnavOffset() {
      try {
        const wrap = document.getElementById('topnav-wrap');
        const shell = document.querySelector('.shell');
        if (!wrap || !shell) return;

        const isMobile = window.matchMedia && window.matchMedia('(max-width: 860px)').matches;

        if (!isMobile) {
          shell.style.paddingTop = '';
          document.documentElement.style.setProperty('--topbar-h', '96px');
          return;
        }

        // 强制写 inline style，绕过部分手机浏览器对 sticky/fixed 的缓存问题
        wrap.style.position = 'fixed';
        wrap.style.top = '0px';
        wrap.style.left = '0px';
        wrap.style.right = '0px';
        wrap.style.width = '100vw';
        wrap.style.zIndex = '2147483000';

        const h = Math.ceil(wrap.getBoundingClientRect().height || 76);
        const pad = Math.max(76, h + 8);

        document.documentElement.style.setProperty('--topbar-h', h + 'px');
        shell.style.paddingTop = pad + 'px';
      } catch (e) {
      }
    }

    function bindMobileFixedTopnavPatch() {
      syncMobileFixedTopnavOffset();

      setTimeout(syncMobileFixedTopnavOffset, 80);
      setTimeout(syncMobileFixedTopnavOffset, 300);
      setTimeout(syncMobileFixedTopnavOffset, 900);

      const btn = document.getElementById('subnav-toggle-btn');
      if (btn && !btn.dataset.fixedPatchBound) {
        btn.dataset.fixedPatchBound = '1';
        btn.addEventListener('click', function() {
          setTimeout(syncMobileFixedTopnavOffset, 0);
          setTimeout(syncMobileFixedTopnavOffset, 80);
          setTimeout(syncMobileFixedTopnavOffset, 220);
        });
      }

      window.addEventListener('orientationchange', function() {
        setTimeout(syncMobileFixedTopnavOffset, 120);
        setTimeout(syncMobileFixedTopnavOffset, 450);
      }, { passive: true });
    }

    function syncSubnavUI() {
      const box = document.getElementById('subnav-bar');
      const btn = document.getElementById('subnav-toggle-btn');
      if (!box || !btn) return;

      box.classList.toggle('show', !__portalSubnavCollapsed);
      btn.classList.toggle('is-open', !__portalSubnavCollapsed);
      btn.textContent = __portalSubnavCollapsed ? '展开目录' : '收起目录';
      btn.setAttribute('aria-expanded', __portalSubnavCollapsed ? 'false' : 'true');
    }

    function bindSubnavToggle() {
      const btn = document.getElementById('subnav-toggle-btn');
      if (!btn) return;
      btn.addEventListener('click', function() {
        __portalSubnavCollapsed = !__portalSubnavCollapsed;
        syncSubnavUI();
      });
    }

    function bindTopNav() {
      document.querySelectorAll('.topnav-link').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const target = btn.dataset.target;
          __portalActiveHeadingId = "";
          __portalSubnavCollapsed = true;
          scrollToSection(target, true);
          afterFrameReady(target, function(frame) {
            resizeFrame(frame);
            renderSubnav(target);
            updateActiveHeadingByScroll(target);
            syncSubnavUI();
          });
          setTimeout(resizeAllFrames, 180);
          setTimeout(function() {
            renderSubnav(target);
            updateActiveHeadingByScroll(target);
            syncSubnavUI();
          }, 360);
        });
      });
    }

    function getCurrentSectionId() {
      const sections = Array.from(document.querySelectorAll('.doc-section'));
      if (!sections.length) return null;

      const viewportCenter = window.innerHeight * 0.38;
      let bestId = sections[0].id;
      let bestScore = Infinity;

      sections.forEach(function(sec) {
        const rect = sec.getBoundingClientRect();
        const sectionCenter = rect.top + rect.height / 2;
        const score = Math.abs(sectionCenter - viewportCenter);

        if (rect.top <= viewportCenter && rect.bottom >= viewportCenter) {
          bestId = sec.id;
          bestScore = -1;
          return;
        }

        if (bestScore !== -1 && score < bestScore) {
          bestScore = score;
          bestId = sec.id;
        }
      });

      return bestId;
    }

    function updateActiveByScroll() {
      const currentId = getCurrentSectionId();
      if (currentId) {
        setActiveNavById(currentId);
        updateActiveHeadingByScroll(currentId);
      }

      const topnavWrap = document.getElementById('topnav-wrap');
      if (topnavWrap) {
        topnavWrap.classList.toggle('scrolled', window.scrollY > 8);
      }
    }

    function onScrollTick() {
      if (__portalManualScrolling) {
        updateActiveByScroll();
        return;
      }
      updateActiveByScroll();
    }

    function handleScroll() {
      if (__portalScrollTicking) return;
      __portalScrollTicking = true;
      window.requestAnimationFrame(function() {
        onScrollTick();
        __portalScrollTicking = false;
      });
    }

    function initFromHash() {
      const hash = (window.location.hash || "").replace("#", "").trim();
      const valid = Array.from(document.querySelectorAll('.doc-section')).map(function(x) { return x.id; });

      if (hash && hash.indexOf("::") > -1) {
        const parts = hash.split("::");
        const sec = parts[0];
        const hid = parts[1];
        if (sec && hid && valid.includes(sec)) {
          setTimeout(function() {
            afterFrameReady(sec, function() {
              renderSubnav(sec);
              scrollToFrameHeading(sec, hid, false);
            });
            scrollToSection(sec, false);
          }, 180);
          return;
        }
      }

      if (hash && valid.includes(hash)) {
        setTimeout(function() {
          scrollToSection(hash, false);
          afterFrameReady(hash, function() {
            renderSubnav(hash);
            updateActiveHeadingByScroll(hash);
          });
        }, 120);
        return;
      }
      setActiveNavById("report-review");
      setTimeout(function() {
        renderSubnav("report-review");
        updateActiveHeadingByScroll("report-review");
      }, 120);
    }

    window.addEventListener("load", function() {
      bindTopNav();
      bindSubnavToggle();
      bindMobileFixedTopnavPatch();
      __portalSubnavCollapsed = true;

      afterFrameReady("report-review", function(frame) {
        resizeFrame(frame);
        renderSubnav("report-review");
        updateActiveHeadingByScroll("report-review");
        syncSubnavUI();
      });

      resizeAllFrames();
      setTimeout(resizeAllFrames, 200);
      setTimeout(resizeAllFrames, 800);
      setTimeout(resizeAllFrames, 1800);
      setTimeout(resizeAllFrames, 3200);

      setTimeout(function() {
        renderSubnav("report-review");
        updateActiveHeadingByScroll("report-review");
        syncSubnavUI();
      }, 420);

      updateActiveByScroll();
      initFromHash();
      syncSubnavUI();
    });

    window.addEventListener("resize", function() {
      debounceResizeAllFrames();
      updateActiveByScroll();
      syncSubnavUI();
    });

    window.addEventListener("scroll", handleScroll, { passive: true });

<script id="qt-ui-force-v5-js">
(function () {
  if (window.__QT_UI_FORCE_V5__) return;
  window.__QT_UI_FORCE_V5__ = true;

  function textOf(el) {
    return String((el && el.textContent) || '').replace(/\s+/g, ' ').trim();
  }

  function cleanHeader(th) {
    if (!th) return '';
    var c = th.cloneNode(true);
    c.querySelectorAll('.qt-sort-controls, .qt-sort-btn').forEach(function (x) {
      x.remove();
    });
    return textOf(c);
  }

  function parseNum(text) {
    if (text == null) return null;

    var s = String(text)
      .replace(/,/g, '')
      .replace(/％/g, '%')
      .replace(/[↑↓▲▼]/g, ' ')
      .replace(/第/g, ' ')
      .replace(/名/g, ' ')
      .trim();

    if (!s) return null;

    var m = s.match(/[-+]?\d+(?:\.\d+)?/);
    if (!m) return null;

    var n = parseFloat(m[0]);
    return Number.isFinite(n) ? n : null;
  }

  function ensureTbody(table) {
    if (!table) return null;
    if (table.tBodies && table.tBodies[0]) return table.tBodies[0];

    var rows = Array.prototype.slice.call(table.querySelectorAll('tr'));
    if (rows.length <= 1) return null;

    var tbody = document.createElement('tbody');
    rows.slice(1).forEach(function (tr) {
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return tbody;
  }

  function getHeaderCells(table) {
    var ths = table.querySelectorAll('thead th');
    if (ths.length) return Array.prototype.slice.call(ths);

    var first = table.querySelector('tr');
    if (!first) return [];
    return Array.prototype.slice.call(first.children || []);
  }

  function shouldSortHeader(header, values) {
    var h = String(header || '').trim();

    var keyword =
      /价值分|价值|总分|评分|得分|分数|核心分|短线分|波段分|延续分|质量|时机|筹码|置信度|概率|仓位|热度|强度|升温|排名|排行|名次|涨幅|跌幅|净额|金额|比例|rank|score|rating|percentile|pct|ratio|rate/i.test(h);

    if (!keyword) return false;

    var count = 0;
    values.forEach(function (v) {
      if (parseNum(v) !== null) count += 1;
    });

    return count >= 2;
  }

  function clearActive(table) {
    table.querySelectorAll('.qt-sort-btn.active').forEach(function (b) {
      b.classList.remove('active');
    });
  }

  function sortTable(table, idx, direction, btn) {
    var tbody = ensureTbody(table);
    if (!tbody) return;

    var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
    if (rows.length < 2) return;

    rows.forEach(function (tr, i) {
      if (!tr.hasAttribute('data-qt-original-index')) {
        tr.setAttribute('data-qt-original-index', String(i));
      }
    });

    rows.sort(function (a, b) {
      var av = a.children && a.children[idx] ? parseNum(a.children[idx].textContent) : null;
      var bv = b.children && b.children[idx] ? parseNum(b.children[idx].textContent) : null;

      if (av === null && bv === null) {
        return Number(a.getAttribute('data-qt-original-index') || 0) -
               Number(b.getAttribute('data-qt-original-index') || 0);
      }

      if (av === null) return 1;
      if (bv === null) return -1;

      var diff = av - bv;
      if (direction === 'desc') diff = -diff;

      if (diff === 0) {
        return Number(a.getAttribute('data-qt-original-index') || 0) -
               Number(b.getAttribute('data-qt-original-index') || 0);
      }

      return diff;
    });

    var frag = document.createDocumentFragment();
    rows.forEach(function (tr) {
      tr.classList.remove('qt-sort-flash');
      frag.appendChild(tr);
    });
    tbody.appendChild(frag);

    clearActive(table);
    if (btn) btn.classList.add('active');

    requestAnimationFrame(function () {
      rows.slice(0, 10).forEach(function (tr) {
        tr.classList.add('qt-sort-flash');
      });
    });
  }

  function addSortButtons(table) {
    if (!table || table.getAttribute('data-qt-sort-v5') === '1') return;

    var headers = getHeaderCells(table);
    if (!headers.length) return;

    var tbody = ensureTbody(table);
    if (!tbody) return;

    var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
    if (rows.length < 2) return;

    headers.forEach(function (th, idx) {
      if (!th || th.querySelector('.qt-sort-controls')) return;

      var header = cleanHeader(th);
      var values = rows.map(function (tr) {
        return tr.children && tr.children[idx] ? tr.children[idx].textContent : '';
      });

      if (!shouldSortHeader(header, values)) return;

      th.classList.add('qt-sortable');

      var oldHtml = th.innerHTML;
      th.innerHTML = '';

      var wrap = document.createElement('span');
      wrap.className = 'qt-th-inner';

      var label = document.createElement('span');
      label.className = 'qt-th-label';
      label.innerHTML = oldHtml;

      var controls = document.createElement('span');
      controls.className = 'qt-sort-controls';

      var asc = document.createElement('button');
      asc.type = 'button';
      asc.className = 'qt-sort-btn asc';
      asc.title = '升序排列';
      asc.setAttribute('aria-label', header + ' 升序排列');

      var desc = document.createElement('button');
      desc.type = 'button';
      desc.className = 'qt-sort-btn desc';
      desc.title = '降序排列';
      desc.setAttribute('aria-label', header + ' 降序排列');

      asc.addEventListener('click', function (ev) {
        ev.preventDefault();
        ev.stopPropagation();
        sortTable(table, idx, 'asc', asc);
      });

      desc.addEventListener('click', function (ev) {
        ev.preventDefault();
        ev.stopPropagation();
        sortTable(table, idx, 'desc', desc);
      });

      controls.appendChild(asc);
      controls.appendChild(desc);

      wrap.appendChild(label);
      wrap.appendChild(controls);
      th.appendChild(wrap);
    });

    table.setAttribute('data-qt-sort-v5', '1');
  }

  function classifyColumns(table) {
    if (!table) return;

    table.classList.add('quant-table');

    var headers = getHeaderCells(table);
    if (!headers.length) return;

    var headerTexts = headers.map(cleanHeader);
    var rows = Array.prototype.slice.call(table.querySelectorAll('tbody tr'));

    headerTexts.forEach(function (h, idx) {
      var cls = [];

      if (/排名|排行|名次|rank/i.test(h)) {
        cls.push('qt-col-rank', 'qt-col-numeric');
      } else if (/价值分|总分|评分|得分|分数|概率|仓位|热度|强度|升温|涨幅|跌幅|净额|金额|比例|pct|ratio|rate|score/i.test(h)) {

<script id="dynamic-mainline-star-extend-v15-js">
(function(){
  var STAR_NAMES = ["芯片概念", "机器人概念", "锂电池概念", "军工", "储能", "华为概念"];
  if(!STAR_NAMES || !STAR_NAMES.length) return;

  function textOf(el){
    return String((el && el.textContent) || '').replace(/\s+/g, ' ').trim();
  }
  function cleanName(s){
    s = String(s || '')
      .replace(/^[\s★☆]+/g, '')
      .replace(/[★☆]+/g, '')
      .replace(/\s*↗\s*$/g, '')
      .replace(/\s*[（(]\s*[-+]?\d+(?:\.\d+)?\s*[)）]\s*$/g, '')
      .replace(/[，,、；;。]+$/g, '')
      .trim();
    return s;
  }
  function norm(s){ return cleanName(s).replace(/\s+/g, ''); }
  var NAME_MAP = new Map();
  STAR_NAMES.forEach(function(n){ NAME_MAP.set(norm(n), n); });
  var NAMES_SORTED = Array.from(NAME_MAP.values()).sort(function(a,b){ return b.length - a.length; });

  function isInsideSvg(el){
    var p = el;
    while(p){
      if(String(p.tagName || '').toUpperCase() === 'SVG') return true;
      p = p.parentElement;
    }
    return false;
  }
  function hasStarClass(el){ return !!(el && el.classList && el.classList.contains('qt-mainline-star-final')); }
  function hasStarAncestor(el){
    var p = el && el.parentElement;
    while(p){
      if(hasStarClass(p)) return true;
      p = p.parentElement;
    }
    return false;
  }
  function markInline(el){
    if(!el || !el.classList || isInsideSvg(el)) return;
    var tag = String(el.tagName || '').toUpperCase();
    if(/^(TD|TH|TR|TABLE|TBODY|THEAD|P|LI|UL|OL|DIV|SECTION|ARTICLE|BODY|HTML)$/.test(tag)) return;
    if(hasStarClass(el) || hasStarAncestor(el)) return;
    el.textContent = textOf(el).replace(/^[\s★☆]+/g, '').trim();
    el.classList.add('qt-mainline-star-final');
  }

  function markExistingInline(root){
    root = root || document;
    root.querySelectorAll('a,span,strong,em,b').forEach(function(el){
      if(isInsideSvg(el)) return;
      var n = norm(textOf(el));
      if(NAME_MAP.has(n)) markInline(el);
    });
  }

  function markSvg(root){
    root = root || document;
    root.querySelectorAll('svg text').forEach(function(el){
      var raw = textOf(el);
      var n = norm(raw);
      if(!NAME_MAP.has(n)) return;
      if(/^\s*★\s*/.test(raw)) return;
      el.textContent = '★ ' + cleanName(raw);
      el.classList.add('qt-dms-v15-svg-star');
    });
  }

  function replaceTextNode(node){
    var txt = node.nodeValue || '';
    if(!txt || txt.indexOf('★') >= 0) return;
    var parent = node.parentElement;
    if(!parent || isInsideSvg(parent)) return;
    if(/^(SCRIPT|STYLE|TEXTAREA|INPUT|CODE|PRE)$/.test(String(parent.tagName || '').toUpperCase())) return;
    if(hasStarAncestor(parent)) return;

    var changed = false;
    var frag = document.createDocumentFragment();
    var rest = txt;

    while(rest){
      var best = null, bestIdx = -1;
      NAMES_SORTED.forEach(function(name){
        var idx = rest.indexOf(name);
        if(idx >= 0 && (bestIdx < 0 || idx < bestIdx || (idx === bestIdx && name.length > best.length))){
          best = name;
          bestIdx = idx;
        }
      });
      if(bestIdx < 0 || !best){
        frag.appendChild(document.createTextNode(rest));
        break;
      }
      if(bestIdx > 0) frag.appendChild(document.createTextNode(rest.slice(0, bestIdx)));

      span.textContent = best;

      markExistingInline(document);

  });
})();
</script>

    var headers = getHeaderCells(table).map(function(x){ return cleanHeader(textOf(x)); }).join('|');

    return /3\.\s*概念对应个股池|概念对应个股池/.test(heading) ||
           (/股票名称/.test(headers) && /概念/.test(headers) && /总评分排名/.test(headers));
  }

  function normalizeNoWrapCell(cell){
    if (!cell) return;

    /* 删除硬换行，彻底避免一格多行 */
    Array.from(cell.querySelectorAll('br')).forEach(function(br){
      br.replaceWith(document.createTextNode(' | '));
    });

    var t = textOf(cell);
    if (t) cell.title = t;

    setImp(cell, 'height', '40px');
    setImp(cell, 'min-height', '40px');
    setImp(cell, 'max-height', '40px');
    setImp(cell, 'line-height', '1.25');
    setImp(cell, 'vertical-align', 'middle');

    setImp(cell, 'white-space', 'nowrap');
    setImp(cell, 'word-break', 'keep-all');
    setImp(cell, 'overflow-wrap', 'normal');
    setImp(cell, 'overflow', 'visible');
    setImp(cell, 'text-overflow', 'clip');
    setImp(cell, 'max-width', 'none');

    Array.from(cell.querySelectorAll('*')).forEach(function(x){
      setImp(x, 'white-space', 'nowrap');
      setImp(x, 'word-break', 'keep-all');
      setImp(x, 'overflow-wrap', 'normal');
      setImp(x, 'flex-wrap', 'nowrap');
      setImp(x, 'max-width', 'none');

      var tag = String(x.tagName || '').toUpperCase();
      if (tag === 'A' || tag === 'SPAN' || tag === 'DIV') {
        setImp(x, 'display', 'inline-flex');
        setImp(x, 'align-items', 'center');
        setImp(x, 'vertical-align', 'middle');
        setImp(x, 'font-size', 'inherit');
        setImp(x, 'line-height', '1.18');
      }
    });
  }

  function markTextCell(cell, headerText){
    if (!cell) return;

    cell.classList.add('qt-final-text-left-nowrap');
    cell.classList.remove('qt-col-numeric');
    cell.classList.remove('qt-col-rank');
    cell.classList.remove('qt-final-numeric-right');

    cell.setAttribute('data-qt-final-header', headerText || '');

    setImp(cell, 'text-align', 'left');
    setImp(cell, 'justify-content', 'flex-start');
    setImp(cell, 'font-variant-numeric', 'normal');

    normalizeNoWrapCell(cell);

    Array.from(cell.querySelectorAll('*')).forEach(function(x){
      setImp(x, 'text-align', 'left');
      setImp(x, 'justify-content', 'flex-start');
    });
  }

  function markNumericCell(cell){
    if (!cell || cell.classList.contains('qt-final-text-left-nowrap')) return;

    cell.classList.add('qt-final-numeric-right');
    setImp(cell, 'text-align', 'right');
    setImp(cell, 'justify-content', 'flex-end');
    setImp(cell, 'font-variant-numeric', 'tabular-nums');

    normalizeNoWrapCell(cell);
  }

  function normalizeTable(table){
    if (!table) return;

    setImp(table, 'table-layout', 'auto');
    setImp(table, 'width', 'max-content');
    setImp(table, 'min-width', '100%');
    setImp(table, 'max-width', 'none');

    var headers = getHeaderCells(table);
    var rows = getRows(table);
    var isPool = isConceptPoolTable(table);

    if (isPool) table.classList.add('qt-concept-stock-pool-table');

    headers.forEach(function(th, idx){
      var h = cleanHeader(textOf(th));

      var textCol = isTextHeader(h);
      var numCol = isNumericHeader(h);

      /* 3. 概念对应个股池：概念、股票名称、标记必须左对齐且不换行 */
      if (isPool && /概念|股票名称|证券名称|个股名称|名称|标记/.test(h)) {
        textCol = true;
        numCol = false;
      }

      if (textCol) {
        markTextCell(th, h);
        rows.forEach(function(tr){
          var td = tr.children && tr.children[idx];
          if (td) markTextCell(td, h);
        });
      } else if (numCol) {
        markNumericCell(th);
        rows.forEach(function(tr){
          var td = tr.children && tr.children[idx];
          if (td) markNumericCell(td);
        });
      } else {
        normalizeNoWrapCell(th);
        rows.forEach(function(tr){
          var td = tr.children && tr.children[idx];
          if (td) normalizeNoWrapCell(td);
        });
      }
    });
  }

  function boot(){
    document.querySelectorAll('.table-wrap,.table-responsive,.markdown-body,.report-content,.doc-body,.article-body,.content,.article,.article-wrap,.portal-doc,.doc-card,.doc-content,section').forEach(function(wrap){
      setImp(wrap, 'overflow-x', 'auto');
      setImp(wrap, 'overflow-y', 'visible');
    });

    document.querySelectorAll('table').forEach(normalizeTable);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

  window.addEventListener('load', function(){
    boot();
    setTimeout(boot, 80);
    setTimeout(boot, 250);
    setTimeout(boot, 800);
    setTimeout(boot, 1600);
  });

  try {
    var timer = null;
    var mo = new MutationObserver(function(){
      clearTimeout(timer);
      timer = setTimeout(boot, 80);
    });
    mo.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['class', 'style'] });
  } catch(e) {}
})();
</script>



<style id="patch-mainline-star-svg-font-final-v3">
/* ==========================================================
   主线热概念星标最终版
   1）每个题材最多 1 个星；
   2）SVG 图例只加普通星号，不做 chip，避免图例名称消失；
   3）HTML 普通文本/chip 才做精致星标；
   4）字体继承原表格字号，避免突然变大。
   ========================================================== */

/* 关闭旧星标伪元素，防止重复 ★ */
.mainline-concept-hit::before,

.qt-mainline-token::before {
  content: none !important;
}

/* 最终唯一星标 chip，只用于 HTML 文本/链接，不用于 SVG */
.qt-mainline-star-final {
  position: relative !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: 3px !important;
  margin: 2px 4px 2px 0 !important;
  padding: 2px 8px !important;

  color: #92400e !important;

}

/* 明确禁止 td/th 自己变成大 chip */
td.qt-mainline-star-final,
th.qt-mainline-star-final,
tr.qt-mainline-star-final,
table.qt-mainline-star-final {
  display: table-cell !important;
  color: inherit !important;
  background: inherit !important;
  border: inherit !important;
  box-shadow: none !important;
  padding: inherit !important;
}

td.qt-mainline-star-final::before,
th.qt-mainline-star-final::before,
tr.qt-mainline-star-final::before,
table.qt-mainline-star-final::before {
  content: none !important;
}

<script id="patch-mainline-star-svg-font-final-v3-js">
(function(){
  if (window.__PATCH_MAINLINE_STAR_SVG_FONT_FINAL_V3__) return;
  window.__PATCH_MAINLINE_STAR_SVG_FONT_FINAL_V3__ = true;

  function textOf(el){
    return String((el && el.textContent) || '').replace(/\s+/g, ' ').trim();
  }

  function cleanName(s){
    s = String(s || '')
      .replace(/^[★☆]\s*/g, '')
      .replace(/[★☆]/g, '')
      .replace(/\s*↗\s*$/g, '')
      .replace(/[，,、；;。]+$/g, '')
      .trim();

    var m = s.match(/^(.+?)\s*[（(]\s*[-+]?\d+(?:\.\d+)?\s*[)）]/);
    if (m) s = m[1].trim();

    return s;
  }

  function norm(s){
    return cleanName(s).replace(/\s+/g, '');
  }

  function isInsideSvg(el){
    var p = el;
    while (p) {
      if (String(p.tagName || '').toUpperCase() === 'SVG') return true;
      p = p.parentElement;
    }
    return false;
  }

  function isConceptLike(s){
    s = cleanName(s);
    if (!s || s.length < 2 || s.length > 24) return false;
    if (/^\d+(\.\d+)?$/.test(s)) return false;
    if (/^(Top|TOP|Rank|Score|分|排名|条数|类型|实体|情感|倾向|置信度)$/i.test(s)) return false;

    return /概念|题材|芯片|机器人|军工|储能|电池|新能源|光伏|高铁|半导体|算力|人工智能|华为|苹果|小米|汽车|低空|商业航天|稀土|有色|煤炭|电力|传媒|游戏|医药|消费|证券|地产|农业|卫星|无人机|传感器|存储芯片|人形机器人/.test(s);
  }

  function addHot(hot, raw){
    var s = cleanName(raw);
    if (!isConceptLike(s)) return;
    hot.set(norm(s), s);
  }

  function splitConceptList(s){
    return String(s || '')
      .replace(/主线为/g, '、')
      .replace(/板块为/g, '、')
      .replace(/题材为/g, '、')
      .split(/[、,，;；/|｜]+/)
      .map(cleanName)
      .filter(Boolean);
  }

  function collectHotConcepts(){
    var hot = new Map();

    /* 继承旧逻辑已经识别出的主线，但只取文本，不保留旧 class */
    document.querySelectorAll('.mainline-concept-hit,.qt-auto-mainline-star,.qt-mainline-token,.qt-mainline-star-final').forEach(function(el){
      addHot(hot, textOf(el));
    });

    var bodyText = textOf(document.body);

    var patterns = [
      /最近一日热度分居前的主线为\s*([^。；;\n]+)/g,
      /最近一日热度分居前的板块为\s*([^。；;\n]+)/g,
      /累计强度居前的板块为\s*([^。；;\n]+)/g,
      /累计强度居前的主线为\s*([^。；;\n]+)/g,
      /今日主线(?:速览)?(?:为|是|：|:)\s*([^。；;\n]+)/g,
      /强主线(?:为|是|：|:)\s*([^。；;\n]+)/g
    ];

    patterns.forEach(function(re){
      var m;
      while ((m = re.exec(bodyText)) !== null) {
        splitConceptList(m[1]).forEach(function(x){ addHot(hot, x); });
      }
    });

    /* 兜底：图形解读里的 “机器人概念(9)” 这类 */
    var reConceptCount = /([\u4e00-\u9fa5A-Za-z0-9]{2,24}(?:概念|芯片|机器人|军工|储能|电池|新能源|光伏|高铁|传感器|存储芯片|人形机器人))\s*[（(]\s*\d+(?:\.\d+)?\s*[)）]/g;
    var mm;
    while ((mm = reConceptCount.exec(bodyText)) !== null) {
      addHot(hot, mm[1]);
    }

    return hot;
  }

  function stripLiteralStars(el){
    if (!el || isInsideSvg(el)) return;

    var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
    var nodes = [];
    var n;
    while ((n = walker.nextNode())) nodes.push(n);

    nodes.forEach(function(node){
      node.nodeValue = String(node.nodeValue || '')
        .replace(/^[\s★☆]+/g, '')
        .replace(/([（(]\s*)[★☆]\s*/g, '$1')
        .replace(/[★☆]+/g, '')
        .replace(/\s+/g, ' ');
    });
  }

  function removeOldClasses(){
    document.querySelectorAll('.mainline-concept-hit,.qt-auto-mainline-star,.qt-mainline-token,.qt-mainline-star-final').forEach(function(el){
      if (!isInsideSvg(el)) stripLiteralStars(el);

      el.classList.remove('mainline-concept-hit');
      el.classList.remove('qt-auto-mainline-star');
      el.classList.remove('qt-mainline-token');

      /* 父级单元格不允许成为 chip */
      if (/^(TD|TH|TR|TABLE|TBODY|THEAD)$/.test(String(el.tagName || '').toUpperCase())) {
        el.classList.remove('qt-mainline-star-final');
      }
    });
  }

  function hasFinalAncestor(el){
    var p = el && el.parentElement;
    while (p) {
      if (p.classList && p.classList.contains('qt-mainline-star-final')) return true;
      p = p.parentElement;
    }
    return false;
  }

  function hasFinalDescendant(el){
    return !!(el && el.querySelector && el.querySelector('.qt-mainline-star-final'));
  }

  function markLeaf(el){
    if (!el || !el.classList || isInsideSvg(el)) return;

    var tag = String(el.tagName || '').toUpperCase();
    if (/^(TD|TH|TR|TABLE|TBODY|THEAD|P|LI|UL|OL|DIV|SECTION|ARTICLE)$/.test(tag)) return;
    if (hasFinalAncestor(el) || hasFinalDescendant(el)) return;

    stripLiteralStars(el);
    el.classList.add('qt-mainline-star-final');
  }

  function decorateExistingInline(hot){
    document.querySelectorAll('a,span,strong,em,b').forEach(function(el){
      if (isInsideSvg(el)) return;
      var t = cleanName(textOf(el));
      if (!t || !hot.has(norm(t))) return;
      markLeaf(el);
    });
  }

  function decoratePlainText(hot){
    var names = Array.from(hot.values())
      .filter(Boolean)
      .sort(function(a,b){ return b.length - a.length; });

    if (!names.length) return;

    var re = new RegExp('(' + names.map(function(x){
      return String(x).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }).join('|') + ')', 'g');

    var walker = document.createTreeWalker(
      document.body,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode: function(node){
          if (!node || !node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;

          var p = node.parentElement;
          if (!p) return NodeFilter.FILTER_REJECT;
          if (isInsideSvg(p)) return NodeFilter.FILTER_REJECT;

          var tag = String(p.tagName || '').toUpperCase();
          if (/^(SCRIPT|STYLE|TEXTAREA|CODE|PRE|TITLE)$/.test(tag)) return NodeFilter.FILTER_REJECT;

          if (hasFinalAncestor(p)) return NodeFilter.FILTER_REJECT;

          /* 表格里只处理纯文本概念，避免把整格复杂内容拆乱 */
          if (/^(TD|TH)$/.test(tag)) {
            var t = cleanName(textOf(p));
            if (!hot.has(norm(t))) return NodeFilter.FILTER_REJECT;
          }

          re.lastIndex = 0;
          return re.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        }
      }
    );

    var nodes = [];
    var n;
    while ((n = walker.nextNode())) nodes.push(n);

    nodes.forEach(function(node){
      var txt = node.nodeValue;
      re.lastIndex = 0;

      var frag = document.createDocumentFragment();
      var last = 0;
      var m;

      while ((m = re.exec(txt)) !== null) {
        if (m.index > last) {
          frag.appendChild(document.createTextNode(txt.slice(last, m.index)));
        }

        var sp = document.createElement('span');
        sp.className = 'qt-mainline-star-final';
        sp.textContent = cleanName(m[1]);
        frag.appendChild(sp);

        last = m.index + m[1].length;
      }

      if (last < txt.length) frag.appendChild(document.createTextNode(txt.slice(last)));
      if (node.parentNode) node.parentNode.replaceChild(frag, node);
    });
  }

  function fixNested(){
    document.querySelectorAll('.qt-mainline-star-final').forEach(function(el){
      if (isInsideSvg(el)) {
        el.classList.remove('qt-mainline-star-final');
        return;
      }

      if (hasFinalDescendant(el)) {
        el.classList.remove('qt-mainline-star-final');
      }

      stripLiteralStars(el);
    });
  }

  function decorateSvgLabels(hot){
    document.querySelectorAll('svg text').forEach(function(el){
      var raw = textOf(el);
      var t = cleanName(raw);
      if (!hot.has(norm(t))) return;

      /* SVG 只保留普通文本，不做 chip，不改 font-size */
      el.textContent = '★ ' + t;
      try {
        el.setAttribute('fill', '#92400e');
        el.setAttribute('font-weight', '700');
      } catch(e) {}
    });
  }

  function boot(){
    var hot = collectHotConcepts();

    removeOldClasses();
    decorateExistingInline(hot);
    decoratePlainText(hot);
    fixNested();
    decorateSvgLabels(hot);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }

  window.addEventListener('load', function(){
    boot();
    setTimeout(boot, 150);
    setTimeout(boot, 600);
    setTimeout(boot, 1500);
  });
})();
</script>
