    .doc-section.active-section {

      box-shadow: 0 14px 30px rgba(220,38,38,.08);
    }

    .doc-frame {
      display: block;
      width: 100%;
      min-height: 1400px;
      border: none;
      background: #fff;
    }

    .floating-top {
      position: fixed;

      width: 44px;
      height: 44px;
      border: none;
      border-radius: 999px;

      font-size: 16px;

      opacity: .9;

&lt;h2 id=&quot;2&quot;&gt;2. 个股全量评分&lt;/h2&gt;
&lt;div class=&quot;callout&quot;&gt;&lt;div class=&quot;callout-title&quot;&gt;重点说明&lt;/div&gt;
&lt;ul&gt;
&lt;li&gt;&lt;code&gt;概念加速/60均成&lt;/code&gt;、&lt;code&gt;加速变化&lt;/code&gt;、&lt;code&gt;动作&lt;/code&gt; 属于&lt;strong&gt;板块环境辅助信号&lt;/strong&gt;，主要用于判断个股所在题材的顺风/平风/逆风状态。&lt;/li&gt;
&lt;li&gt;这三列&lt;strong&gt;不宜单独作为&lt;span class=&quot;note-mark&quot;&gt;一级买卖依据&lt;/span&gt;&lt;/strong&gt;，更适合在个股本身已满足强度、趋势、资金等条件后，用作&lt;span class=&quot;note-mark&quot;&gt;二级过滤&lt;/span&gt;。&lt;/li&gt;
&lt;li&gt;&lt;code&gt;动作&lt;/code&gt; 为板块综合状态标签，通常综合了概率、强度、风险、主力行为、资金加速度等因素，&lt;strong&gt;不是仅由前两列直接机械推出&lt;/strong&gt;。&lt;/li&gt;
&lt;li&gt;&lt;span class=&quot;note-mark&quot;&gt;实战理解建议&lt;/span&gt;：&lt;strong&gt;先看市场环境，再看板块状态，最后看个股执行。&lt;/strong&gt;&lt;/li&gt;

&lt;li&gt;强势概念前列：&lt;strong&gt;青蒿素(81.2)、养鸡(80.8)、猪肉(76.7)、光刻机(76.3)、F5G概念(76.0)&lt;/strong&gt;&lt;/li&gt;

&lt;h3 id=&quot;35&quot;&gt;3.5 概念板块资金流入加速度&lt;/h3&gt;
&lt;div class=&quot;callout&quot;&gt;&lt;div class=&quot;callout-title&quot;&gt;重点说明&lt;/div&gt;
&lt;ul&gt;
&lt;li&gt;&lt;code&gt;10日加速/60均成&lt;/code&gt; 与 &lt;code&gt;加速变化&lt;/code&gt; 是对板块资金变化做归一化后的结果，很多数值接近 &lt;code&gt;0&lt;/code&gt;、&lt;code&gt;0.01&lt;/code&gt;、&lt;code&gt;-0.01&lt;/code&gt; 属于常见现象。&lt;/li&gt;
&lt;li&gt;这通常意味着板块边际资金变化幅度不大，或展示精度对微小差异做了压缩，&lt;strong&gt;不等于完全没有参考意义&lt;/strong&gt;。&lt;/li&gt;
&lt;li&gt;本表更适合用来判断题材是否继续获得增量资金关注、是否改善或转弱，&lt;strong&gt;不建议将单一加速值直接当成买卖触发器&lt;/strong&gt;。&lt;/li&gt;
&lt;li&gt;若要落到交易层，应与 &lt;code&gt;10日概率&lt;/code&gt;、&lt;code&gt;次日最强&lt;/code&gt;、&lt;code&gt;风险&lt;/code&gt;、&lt;code&gt;动作&lt;/code&gt; 等字段联合理解。&lt;/li&gt;
&lt;/ul&gt;

&lt;h4 id=&quot;40a&quot;&gt;4.0A 主线速览口径说明&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;4.0 今日主线速览&lt;/strong&gt;：偏&lt;strong&gt;交易摘要口径&lt;/strong&gt;。不是单看某条新闻本身，而是把 &lt;strong&gt;新闻倾向、板块动作、10日概率、资金加速、加速变化、风险标签&lt;/strong&gt; 合在一起后，给出更适合交易执行的主线结论。&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;4.1~4.3 新闻消息判断/关键词摘要&lt;/strong&gt;：偏&lt;strong&gt;原始消息口径&lt;/strong&gt;。更强调“有哪些新闻命中、新闻偏多还是偏空、哪些实体/题材被反复提及”，更适合做消息核查与素材追溯。&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;核心区别&lt;/strong&gt;：新闻偏多，不一定就是主线；只有当 &lt;strong&gt;消息面 + 概率 + 资金 + 加速 + 动作&lt;/strong&gt; 同时配合时，才更适合进入 &lt;code&gt;4.0&lt;/code&gt; 的主线速览。&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;当前判断依据&lt;/strong&gt;：本表主要看 &lt;code&gt;新闻倾向&lt;/code&gt; 判断情绪方向，看 &lt;code&gt;板块动作&lt;/code&gt; 判断参与方式，看 &lt;code&gt;10日概率/加速/加速变化&lt;/code&gt; 判断持续性与边际变化，再结合 &lt;code&gt;风险/建议&lt;/code&gt; 做落地过滤。&lt;/li&gt;

&lt;h2 id=&quot;_1&quot;&gt;使用注意事项&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;code&gt;final_score&lt;/code&gt;：综合总分，适合作为整份文件的&lt;span class=&quot;note-mark&quot;&gt;主排序口径&lt;/span&gt;；优先看它，再结合其他细分分数做风格判断。&lt;/li&gt;

&lt;li&gt;&lt;code&gt;final_score_swing&lt;/code&gt;：更偏波段与分歧低吸，相对更稳，不适合拿来做纯日内冲击判断。&lt;/li&gt;
&lt;li&gt;&lt;code&gt;value_score&lt;/code&gt;：当前整份报告统一引用最新 V10 全样本的价值分口径（含 V9 / V3 / 其它所有表格），更偏基本面/估值/质量维度，适合做中线观察与价值视角补充，不宜单独当成短线买点。&lt;/li&gt;
&lt;li&gt;&lt;code&gt;attack_eff_v2_score / attack_eff&lt;/code&gt;：更偏进攻效率与拉升弹性，适合找进攻型候选，但高分不等于低风险。&lt;/li&gt;

&lt;li&gt;整体&lt;span class=&quot;note-mark&quot;&gt;使用顺序建议&lt;/span&gt;：先看 &lt;code&gt;final_score&lt;/code&gt;，再结合 &lt;code&gt;short/swing/value/attack/fund&lt;/code&gt; 判断风格，不要只盯单一分数。&lt;/li&gt;

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/&lt;[^&gt;]+&gt;/g, &#x27;&#x27;)
        .replace(/[\s\u3000]+/g, &#x27;-&#x27;)

    }

    function buildToc() {
      const container = document.getElementById(&quot;content&quot;);
      const tocList = document.getElementById(&quot;toc-list&quot;);
      if (!container || !tocList) return;

      const headings = container.querySelectorAll(&quot;h1, h2, h3, h4, h5&quot;);
      const used = new Set();

      headings.forEach((h, idx) =&gt; {
        let id = h.id || slugify(h.textContent) || (&quot;section-&quot; + idx);
        if (used.has(id)) {
          id = id + &quot;-&quot; + idx;
        }
        used.add(id);
        h.id = id;

        const li = document.createElement(&quot;li&quot;);
        li.className = &quot;toc-&quot; + h.tagName.toLowerCase();

        if (h.tagName.toLowerCase() === &quot;h2&quot;) li.classList.add(&quot;toc-l2&quot;);
        if (h.tagName.toLowerCase() === &quot;h3&quot;) li.classList.add(&quot;toc-l3&quot;);
        if (h.tagName.toLowerCase() === &quot;h4&quot;) li.classList.add(&quot;toc-l4&quot;);
        if (h.tagName.toLowerCase() === &quot;h5&quot;) li.classList.add(&quot;toc-l5&quot;);

        const a = document.createElement(&quot;a&quot;);
        a.href = &quot;#&quot; + id;
        a.textContent = h.textContent;
        li.appendChild(a);
        tocList.appendChild(li);
      });
    }

    function wrapTables() {
      document.querySelectorAll(&quot;table&quot;).forEach(function(tbl) {
        if (!tbl.parentElement.classList.contains(&quot;table-wrap&quot;)) {
          const wrapper = document.createElement(&quot;div&quot;);
          wrapper.className = &quot;table-wrap&quot;;
          tbl.parentNode.insertBefore(wrapper, tbl);
          wrapper.appendChild(tbl);

        const colCount = tbl.querySelectorAll(&quot;thead th&quot;).length;

        tbl.classList.remove(&quot;sticky-two-cols&quot;);
        if (colCount &gt;= 2) {
          tbl.classList.add(&quot;sticky-first-col&quot;);

      });

        const seenIds = new Set();
        let currentH2 = "";

        const levelCaps = isPicksPage
          ? { h2: 40, h3: 160 }
          : { h2: 999, h3: 60, h4: 60, h5: 40 };

        const levelCount = isPicksPage
          ? { h2: 0, h3: 0 }
          : { h2: 0, h3: 0, h4: 0, h5: 0 };

        const TOTAL_CAP = isPicksPage ? 220 : 160;

        allNodes.forEach(function(node) {
          if (nodes.length >= TOTAL_CAP) return;

          const level = (node.tagName || '').toLowerCase();
          if (!Object.prototype.hasOwnProperty.call(levelCaps, level)) return;
          if (levelCount[level] >= levelCaps[level]) return;

          const id = (node.id || '').trim();
          if (!id) return;

          const dedupKey = level + "::" + id;
          if (seenIds.has(dedupKey)) return;
          seenIds.add(dedupKey);

          const text = normalizeHeadingText(node.textContent);
          if (!isUsefulHeading(text)) return;

          if (level === 'h2') {
            currentH2 = text;
          }

          nodes.push({
            id: id,
            text: text,
            rawText: text,
            parentText: currentH2,
            level: level
          });

          levelCount[level] += 1;
        });

        if (isPicksPage) {
          // 不是删除同名标题，而是给跨版本重复 h3 自动补父级前缀
          // 例如：
          // V10结果 · 核心总分Top
          // V9结果 · 核心总分Top
          const dupCount = {};

          nodes.forEach(function(item) {
            if (item.level === 'h3') {
              dupCount[item.rawText] = (dupCount[item.rawText] || 0) + 1;
            }
          });

          nodes.forEach(function(item) {
            if (
              item.level === 'h3' &&
              dupCount[item.rawText] > 1 &&
              item.parentText
            ) {
              item.text = item.parentText + ' · ' + item.rawText;
            }
          });
        }

        __portalSubnavCache[sectionId] = nodes;
        return nodes;
      } catch (e) {
        return [];
      }
    }

    function renderSubnav(sectionId) {

      const box = document.getElementById('subnav-bar');
      if (!box) return;
      const headings = getFrameHeadings(sectionId);
      if (!headings.length) {
        box.innerHTML = '<div class="subnav-empty">当前区域暂无可提取的小标题导航</div>';
        syncSubnavUI();
        return;
      }
      box.innerHTML = headings.map(function(item) {
        const safeText = item.text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
        const activeCls = (__portalActiveHeadingId === (sectionId + '::' + item.id)) ? ' active' : '';
        return '<button class="subnav-chip' + activeCls + '" type="button" data-section="' + sectionId + '" data-heading-id="' + item.id + '">' + safeText + '</button>';
      }).join('');
      box.querySelectorAll('.subnav-chip').forEach(function(btn) {
        btn.addEventListener('click', function() {
          scrollToFrameHeading(btn.dataset.section, btn.dataset.headingId, true);
        });
      });

      syncSubnavUI();
    }

    function scrollToFrameHeading(sectionId, headingId, updateHash=true) {
      const section = document.getElementById(sectionId);
      const iframe = getSectionFrame(sectionId);
      if (!section || !iframe) {
        scrollToSection(sectionId, updateHash);
        return;
      }
      try {
        const doc = iframe.contentWindow.document;
        const target = doc.getElementById(headingId);
        if (!target) {
          scrollToSection(sectionId, updateHash);
          return;
        }
        const offset = getTopbarOffset();
        const sectionTop = section.getBoundingClientRect().top + window.pageYOffset;
        const bodyRectTop = doc.body.getBoundingClientRect().top;
        const targetTopInFrame = target.getBoundingClientRect().top - bodyRectTop;
        const y = sectionTop + targetTopInFrame - offset - 6;

        __portalManualScrolling = true;
        __portalActiveHeadingId = sectionId + '::' + headingId;
        window.scrollTo({ top: y, behavior: 'smooth' });
        setActiveNavById(sectionId);

        document.querySelectorAll('.subnav-chip').forEach(function(chip) {
          const on = chip.dataset.section === sectionId && chip.dataset.headingId === headingId;
          chip.classList.toggle('active', on);
        });

        __portalSubnavCollapsed = true;
        syncSubnavUI();

        if (updateHash && history.replaceState) {
          history.replaceState(null, "", "#" + sectionId + "::" + headingId);
        }
        setTimeout(function() {
          __portalManualScrolling = false;
        }, 500);
      } catch (e) {
        scrollToSection(sectionId, updateHash);
      }
    }

    function updateActiveHeadingByScroll(sectionId) {
      const iframe = getSectionFrame(sectionId);
      const section = document.getElementById(sectionId);
      if (!iframe || !section) return;
      try {
        const doc = iframe.contentWindow.document;
        const headings = Array.from(doc.querySelectorAll('h2[id], h3[id]'));
        if (!headings.length) return;

        const sectionRect = section.getBoundingClientRect();
        const probeYInSection = Math.max(0, getTopbarOffset() + 18 - sectionRect.top);
        const bodyRectTop = doc.body.getBoundingClientRect().top;

        let best = null;
        let bestY = -Infinity;
        headings.forEach(function(h) {
          const y = h.getBoundingClientRect().top - bodyRectTop;
          if (y <= probeYInSection + 12 && y > bestY) {
            best = h;
            bestY = y;
          }
        });
        if (!best) best = headings[0];

        __portalActiveHeadingId = sectionId + '::' + best.id;
        document.querySelectorAll('.subnav-chip').forEach(function(chip) {
          const on = chip.dataset.section === sectionId && chip.dataset.headingId === best.id;
          chip.classList.toggle('active', on);
        });
      } catch (e) {
      }
    }

    function syncSubnavUI() {
      const box = document.getElementById('subnav-bar');
      const btn = document.getElementById('subnav-toggle-btn');
      if (!box || !btn) return;

      box.classList.toggle('show', !__portalSubnavCollapsed);
      btn.classList.toggle('is-open', !__portalSubnavCollapsed);
      btn.textContent = __portalSubnavCollapsed ? '展开目录' : '收起目录';
      btn.setAttribute('aria-expanded', __portalSubnavCollapsed ? 'false' : 'true');
    }

    function bindSubnavToggle() {
      const btn = document.getElementById('subnav-toggle-btn');
      if (!btn) return;
      btn.addEventListener('click', function() {
        __portalSubnavCollapsed = !__portalSubnavCollapsed;
        syncSubnavUI();
      });
    }

    function bindTopNav() {
      document.querySelectorAll('.topnav-link').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const target = btn.dataset.target;
          __portalActiveHeadingId = "";
          __portalSubnavCollapsed = true;
          scrollToSection(target, true);
          setTimeout(resizeAllFrames, 180);
          setTimeout(function() {
            renderSubnav(target);
            updateActiveHeadingByScroll(target);
            syncSubnavUI();
          }, 220);
        });
      });
    }

    function getCurrentSectionId() {
      const sections = Array.from(document.querySelectorAll('.doc-section'));
      if (!sections.length) return null;

      const viewportCenter = window.innerHeight * 0.38;
      let bestId = sections[0].id;
      let bestScore = Infinity;

      sections.forEach(function(sec) {
        const rect = sec.getBoundingClientRect();
        const sectionCenter = rect.top + rect.height / 2;
        const score = Math.abs(sectionCenter - viewportCenter);

        if (rect.top <= viewportCenter && rect.bottom >= viewportCenter) {
          bestId = sec.id;
          bestScore = -1;
          return;
        }

        if (bestScore !== -1 && score < bestScore) {
          bestScore = score;
          bestId = sec.id;
        }
      });

      return bestId;
    }

    function updateActiveByScroll() {
      const currentId = getCurrentSectionId();
      if (currentId) {
        setActiveNavById(currentId);
        updateActiveHeadingByScroll(currentId);
      }

      const topnavWrap = document.getElementById('topnav-wrap');
      if (topnavWrap) {
        topnavWrap.classList.toggle('scrolled', window.scrollY > 8);
      }
    }

    function onScrollTick() {
      if (__portalManualScrolling) {
        updateActiveByScroll();
        return;
      }
      updateActiveByScroll();
    }

    function handleScroll() {
      if (__portalScrollTicking) return;
      __portalScrollTicking = true;
      window.requestAnimationFrame(function() {
        onScrollTick();
        __portalScrollTicking = false;
      });
    }

    function initFromHash() {
      const hash = (window.location.hash || "").replace("#", "").trim();
      const valid = Array.from(document.querySelectorAll('.doc-section')).map(function(x) { return x.id; });

      if (hash && hash.indexOf("::") > -1) {
        const parts = hash.split("::");
        const sec = parts[0];
        const hid = parts[1];
        if (sec && hid && valid.includes(sec)) {
          setTimeout(function() {
            renderSubnav(sec);
            scrollToFrameHeading(sec, hid, false);
          }, 180);
          return;
        }
      }

      if (hash && valid.includes(hash)) {
        setTimeout(function() {
          scrollToSection(hash, false);
          renderSubnav(hash);
          updateActiveHeadingByScroll(hash);
        }, 120);
        return;
      }
      setActiveNavById("report-review");
      setTimeout(function() {
        renderSubnav("report-review");
        updateActiveHeadingByScroll("report-review");
      }, 120);
    }

    window.addEventListener("load", function() {
      bindTopNav();
      bindSubnavToggle();
      __portalSubnavCollapsed = true;

      resizeAllFrames();
      setTimeout(resizeAllFrames, 200);
      setTimeout(resizeAllFrames, 800);
      setTimeout(resizeAllFrames, 1800);
      setTimeout(resizeAllFrames, 3200);

      setTimeout(function() {
        renderSubnav("report-review");
        updateActiveHeadingByScroll("report-review");
        syncSubnavUI();
      }, 260);

      updateActiveByScroll();
      initFromHash();
      syncSubnavUI();
    });

    window.addEventListener("resize", function() {
      debounceResizeAllFrames();
      updateActiveByScroll();
      syncSubnavUI();
    });

    window.addEventListener("scroll", handleScroll, { passive: true });
  </script>
</body>
</html>
